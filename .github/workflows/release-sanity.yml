name: Release Sanity

# Release-readiness gate for Hecate and Empusa.
#
# Validates: version consistency, changelog entries, lint, tests,
# repo integrity, and cross-repo alignment.
#
# Designed as a pre-tag/pre-release check.  Run this before creating
# a release tag.  The workflow is read-only — it never creates tags,
# mutates files, or publishes anything.

on:
  workflow_dispatch:
    inputs:
      empusa_ref:
        description: "Empusa git ref to validate against"
        required: false
        type: string
        default: main

permissions:
  contents: read

jobs:
  sanity:
    name: Release readiness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Hecate
        uses: actions/checkout@v4
        with:
          path: hecate
          fetch-depth: 0  # need tags for version checks

      - name: Checkout Empusa
        uses: actions/checkout@v4
        with:
          repository: Icarus4122/empusa
          ref: ${{ inputs.empusa_ref || 'main' }}
          path: empusa
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Empusa + dev deps
        run: pip install -e ./empusa[dev]

      - name: Run release-sanity.sh (strict)
        env:
          EMPUSA_SRC: ${{ github.workspace }}/empusa
          # Release-grade gates. Strict checksum is the default in
          # release-sanity.sh whenever RELEASE_SANITY_SKIP_CHECKSUMS is unset;
          # the env var is exported here to make the intent explicit and to
          # propagate into nested Empusa invocations.
          STRICT_CHECKSUMS: "1"
          STRICT_MODULES: "1"
          STRICT_TEMPLATES: "1"
        run: |
          cd hecate
          bash scripts/dev/release-sanity.sh

      - name: Collect release evidence (strict)
        env:
          EMPUSA_SRC: ${{ github.workspace }}/empusa
          STRICT_CHECKSUMS: "1"
        run: |
          cd hecate
          mkdir -p build/release-evidence
          ts="$(date -u +%Y%m%dT%H%M%SZ)"
          bash scripts/dev/release-evidence.sh --strict \
              --out "build/release-evidence/${ts}.txt" \
              "${EMPUSA_SRC}"

      - name: Upload release-evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-${{ github.run_id }}
          path: hecate/build/release-evidence/
          retention-days: 90
          if-no-files-found: warn
