name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: Shell syntax & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Syntax check (bash -n)
        run: bash scripts/dev/ci-syntax-check.sh

      - name: ShellCheck lint
        run: |
          shopt -s nullglob
          targets=(
            labctl
            scripts/*.sh
            scripts/lib/*.sh
            scripts/dev/*.sh
            tests/helpers.sh
            tests/run-all.sh
            tests/test_*.sh
            tests/e2e/e2e-helpers.sh
            tests/e2e/run-validation.sh
            tests/e2e/stage_*.sh
            tests/e2e/scenarios/*.sh
            tmux/profiles/*.sh
          )
          shellcheck --severity=error --shell=bash "${targets[@]}"

  shell-tests:
    name: Shell tests
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - uses: actions/checkout@v4

      - name: Ensure dependencies
        run: |
          for cmd in bash file jq curl; do
            command -v "$cmd" >/dev/null || { echo "::error::Missing $cmd"; exit 1; }
          done

      - name: Run test suite
        run: bash tests/run-all.sh

  repo-integrity:
    name: Repo integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate repo structure
        run: bash scripts/dev/ci-repo-integrity.sh

  compose-lint:
    name: Compose config lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install docker-compose
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq docker-compose

      - name: Validate compose files
        run: bash scripts/dev/ci-compose-lint.sh
